kind = "web"
previewPath = "/"
title = "MONARCH"
version = "1.0.0"
id = "artifacts/monarch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23548

[services.development]
run = "pnpm --filter @workspace/monarch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/monarch", "run", "build" ]
publicDir = "artifacts/monarch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23548"
BASE_PATH = "/"
